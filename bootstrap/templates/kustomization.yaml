# Reduces CPU requests for the Akuity agents so they schedule comfortably on k3d.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-application-controller
      namespace: akuity
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-application-controller
        namespace: akuity
      spec:
        template:
          spec:
            containers:
              - name: syncer
                resources:
                  requests:
                    cpu: 50m
              - name: argocd-application-controller
                resources:
                  requests:
                    cpu: 100m
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-repo-server
      namespace: akuity
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
        namespace: akuity
      spec:
        template:
          spec:
            replicas: 1
            containers:
              - name: argocd-repo-server
                resources:
                  requests:
                    cpu: 50m
